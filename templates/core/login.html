{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<h1>Вход в аккаунт</h1>
<form method="post" style="max-width:400px; background:#fff; padding:30px; border-radius:10px; margin-top:20px;">
    {% csrf_token %}
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <div class="form-group"><label>Логин</label><input type="text" name="username" required></div>
    <div class="form-group"><label>Пароль</label><input type="password" name="password" required></div>
    <button type="submit" class="btn" style="width:100%;">Войти</button>
    <p style="margin-top:15px; text-align:center;">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</form>
{% endblock %}
