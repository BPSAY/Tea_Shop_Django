{% extends 'base.html' %}
{% block title %}Профиль{% endblock %}
{% block content %}
<h1>Личный кабинет</h1>
<form method="post" style="max-width:500px; background:#fff; padding:30px; border-radius:10px; margin-top:20px;">
    {% csrf_token %}
    <div class="form-group"><label>Имя</label><input type="text" name="first_name" value="{{ user.first_name }}"></div>
    <div class="form-group"><label>Фамилия</label><input type="text" name="last_name" value="{{ user.last_name }}"></div>
    <div class="form-group"><label>Телефон</label><input type="text" name="phone" value="{{ user.profile.phone }}"></div>
    <div class="form-group"><label>Адрес</label><input type="text" name="address" value="{{ user.profile.address }}"></div>
    <button type="submit" class="btn">Сохранить</button>
</form>
<div style="margin-top:20px;">
    <a href="{% url 'order_history' %}" class="btn-outline btn">Мои заказы</a>
    <a href="{% url 'logout' %}" class="btn-outline btn" style="border-color:#dc3545; color:#dc3545;">Выйти</a>
</div>
{% endblock %}
